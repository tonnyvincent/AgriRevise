<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgriRevise</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="page">

    <!--
      ═══ BACKGROUND ═══
      Replace <div class="bg-fallback"> with:
      <img src="farm-bg.jpg" alt="Farm" class="bg-img" />
      Recommended: 1920×1080 px
    -->
    <div class="bg-fallback"></div>
    <div class="bg-overlay"></div>

    <!-- ═══ NAVBAR ═══ -->
    <nav>
      <a href="#" class="nav-logo">
        <!--
          Replace <div class="nav-logo-img"> with:
          <img src="logo.png" alt="AgriRevise" class="nav-logo-img" />
        -->
        <div class="nav-logo-img">LOGO</div>
        <span class="nav-logo-text">
          <span class="logo-agri">Agri</span><span class="logo-revise">Revise</span>
        </span>
      </a>

      <ul class="nav-links">
        <li><a href="#">Beranda</a></li>
        <li><a href="#">Kursus</a></li>        
        <li><a href="#">Kuiz</a></li>
        <li><a href="#">Tentang Kami</a></li>
        <li><a href="#" class="nav-cta">Mula Belajar</a></li>
      </ul>
    </nav>

    <!-- ═══ HERO BODY ═══ -->
    <div class="hero-body">

      <!-- Center text -->
      <div class="hero-text">
        <p class="hero-welcome">Selamat Datang di</p>
        <h1 class="hero-title">
          <span class="t-agri">Agri</span><span class="t-revise">Revise</span>
        </h1>
        <p class="hero-subtitle">Platform Interaktif untuk Memahami Pertanian</p>
        <a href="#" class="hero-btn">Jelajahi Sekarang</a>
      </div>

    </div>

    <!-- ═══ BOTTOM FEATURE CARDS ═══ -->
    <div class="cards-bar">
      <div class="cards-row">

        <!-- Card 1 -->
        <div class="feat-card">
          <!--
            Replace <div class="feat-card-icon"> content with:
            <img src="icon-kursus.png" alt="Kursus" />
          -->
          <div class="feat-card-icon">
            <div class="icon-ph">💻</div>
            <span>Icon here</span>
          </div>
          <div class="feat-card-label">Kursus Interaktif</div>
        </div>

        <!-- Card 2 -->
        <div class="feat-card">
          <!--
            Replace with: <img src="icon-kuiz.png" alt="Kuiz" />
          -->
          <div class="feat-card-icon">
            <div class="icon-ph">📝</div>
            <span>Icon here</span>
          </div>
          <div class="feat-card-label">Kuiz Edukatif</div>
        </div>

        <!-- Card 3 -->
        <div class="feat-card">
          <!--
            Replace with: <img src="icon-komuniti.png" alt="Komunitas" />
          -->
          <div class="feat-card-icon">
            <div class="icon-ph">👥</div>
            <span>Icon here</span>
          </div>
          <div class="feat-card-label">Komuniti Petani</div>
        </div>

      </div>
    </div>

  </div><!-- /.page -->

  <script src="script.js"></script>
</body>
</html>
