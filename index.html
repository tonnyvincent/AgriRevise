<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgriRevise</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="page">

    <!-- BACKGROUND IMAGES -->
    <img src="images/background-tanpa-tulisan-depan.png" alt="Farm" class="bg-img" />
    <div class="bg-overlay"></div>

    <!-- ═══ NAVBAR ═══ -->
    <nav>
      <a href="#" class="nav-logo">
        <!--
          Replace <div class="nav-logo-img"> with:
          <img src="logo.png" alt="AgriRevise" class="nav-logo-img" />
        -->
        <img src="images/agrirevise-logo.png" alt="AgriRevise" class="nav-logo-img" />
        <span class="nav-logo-text">
          <span class="logo-agri">Agri</span><span class="logo-revise">Revise</span>
        </span>
      </a>

      <div class="nav-right">
        <ul class="nav-links">
          <li><a href="#">Manual Penggunaan</a></li>
          <li><a href="#">Latihan Pengukuhan</a></li>        
          <li><a href="#">Papan Prestasi</a></li>
        </ul>

        <div class="nav-actions">
          <a href="#" class="nav-cta">Home</a>
          <button class="nav-toggle" id="nav-toggle">☰</button>

          <div class="nav-dropdown" id="nav-dropdown">
            <a href="#">Manual Penggunaan</a>
            <a href="#">Latihan Pengukuhan</a>
            <a href="#">Papan Prestasi</a>
          </div>
        </div>
      </div>
    </nav>

    <!-- ═══ HERO BODY ═══ -->
    <div class="hero-body">

      <!-- Center text -->
      <div class="hero-text">
        <p class="hero-welcome">Selamat Datang di</p>
        <h1 class="hero-title">
          <span class="t-agri">Agri</span><span class="t-revise">Revise</span>
        </h1>
        <p class="hero-subtitle">Mari Kita Ulang Kaji Bab Sains Tanah</p>
        <a href="#" class="hero-btn">Jelajahi Sekarang</a>
      </div>

    </div>

    <!-- ═══ BOTTOM FEATURE CARDS ═══ -->
    <div class="cards-bar">
      <div class="cards-row">

        <!-- Card 1 -->
        <div class="feat-card">
          <!--
            icon for first card: <img src="manual-penggunaan.png" alt="Manual Penggunaan" />
          -->
          <div class="feat-card-icon">
            <img src="images/icon-manual-penggunaan-depan.png" alt="Manual Penggunaan" />
          </div>
          <div class="feat-card-label">Manual Penggunaan</div>
        </div>

        <!-- Card 2 -->
        <div class="feat-card">
          <!--
            icon for second card: <img src="latihan-pengukuhan.png" alt="Latihan Pengukuhan" />
          -->
          <div class="feat-card-icon">
            <img src="images/icon-latihan-pengukuhan-depan.png" alt="Latihan Pengukuhan" />
          </div>
          <div class="feat-card-label">Latihan Pengukuhan</div>
        </div>

        <!-- Card 3 -->
        <div class="feat-card">
          <!--
            icon for third card: <img src="papan-prestasi.png" alt="Papan Prestasi" />
          -->
          <div class="feat-card-icon">
            <img src="images/icon-leaderboard-depan.png" alt="Papan Prestasi" />
          </div>
          <div class="feat-card-label">Papan Prestasi</div>
        </div>

      </div>
    </div>

  </div><!-- /.page -->

  <script src="script.js"></script>
</body>
</html>
