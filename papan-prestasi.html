<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Papan Prestasi - +AgriRevise</title>

  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="page leaderboard-page">

    <!-- BACKGROUND -->
    <img src="images/background-latihan-pengukuhan.png" alt="Farm" class="bg-img desktop-bg" />
    <img src="images/background-latihan-pengukuhan-mobile.png" alt="Farm Mobile" class="bg-img mobile-bg" />
    <div class="bg-overlay"></div>

    <!-- NAVBAR -->
    <nav>
      <a href="#" class="nav-logo">
        <img src="images/agrirevise-logo.png" alt="AgriRevise" class="nav-logo-img" />

        <span class="nav-logo-text">
          <span class="logo-agri">+Agri</span><span class="logo-revise">Revise</span>
        </span>
      </a>

      <div class="nav-right">
        <ul class="nav-links">
          <li><a href="manual-penggunaan.html">Manual Penggunaan</a></li>
          <li><a href="latihan-pengukuhan.html">Latihan Pengukuhan</a></li>
          <li><a href="papan-prestasi.html">Papan Prestasi</a></li>
        </ul>

        <div class="nav-actions">
          <a href="index.html" class="nav-cta">Laman Utama</a>

          <button class="nav-toggle" id="nav-toggle">☰</button>

          <div class="nav-dropdown" id="nav-dropdown">
            <a href="manual-penggunaan.html">Manual Penggunaan</a>
            <a href="latihan-pengukuhan.html">Latihan Pengukuhan</a>
            <a href="papan-prestasi.html">Papan Prestasi</a>
          </div>
        </div>
      </div>
    </nav>

    <!-- TITLE -->
    <div class="lp-title-bar">
      <div class="lp-title-pill"><span class="ar-page-icon ar-icon-trophy" aria-hidden="true"><span></span></span>Papan Prestasi</div>
    </div>

    <!-- LEADERBOARD -->
    <div class="leaderboard-wrapper">

      <div class="leaderboard-card">

        <div class="leaderboard-tools">
          <div class="leaderboard-tools-top">
            <label for="leaderboard-sort">Susun ikut</label>
            <div class="leaderboard-pagination" id="leaderboard-pagination">
              <button type="button" id="leaderboard-prev" aria-label="Halaman sebelumnya">&lt;</button>
              <span id="leaderboard-page-label">1 / 1</span>
              <button type="button" id="leaderboard-next" aria-label="Halaman seterusnya">&gt;</button>
            </div>
          </div>
          <select id="leaderboard-sort">
            <option value="total">Jumlah</option>
            <option value="jenis_sifat_tanah">Jenis dan Sifat Tanah</option>
            <option value="tanah_tapak_penanaman">Tanah di Tapak Penanaman</option>
            <option value="struktur_tanah">Struktur Tanah</option>
            <option value="ph_tanah">pH Tanah</option>
            <option value="kaedah_memperbaiki_tanah">Kaedah Memperbaiki Tanah</option>
            <option value="jenis_baja">Jenis Baja</option>
            <option value="pengiraan_kos_baja">Pengiraan Kos Baja</option>
          </select>
        </div>

        <div class="leaderboard-header">
          <div>No</div>
          <div>Nama</div>
          <div id="leaderboard-score-heading">Jumlah Skor</div>
        </div>

        <div id="leaderboard-list"></div>

      </div>

    </div>

  </div>

  <script src="score-api.js"></script>
  <script src="script.js"></script>
  <script src="leaderboard.js"></script>
</body>
</html>
